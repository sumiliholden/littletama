name: Deploy Next.js to EC2

on:
  push:
    branches:
      - main  # Change to 'master' if your default branch is master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://superadmin.littletama.com
          NEXT_PUBLIC_APP_URL: https://littletama.com
          NEXT_PUBLIC_COGNITO_FORM_KEY: hIU4VB7QkEWbeG8RmdDDrA
          NEXT_PUBLIC_COGNITO_FORM_ID: 2

      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".next,public,package.json,package-lock.json,next.config.js,next.config.ts,.env.production"
          target: "/var/www/littletama"
          strip_components: 0
          rm: false
          overwrite: true

      - name: Restart PM2 on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/littletama
            /usr/bin/pm2 restart littletama || /usr/bin/pm2 start npm --name "littletama" -- start
            /usr/bin/pm2 save
            echo "✅ PM2 restart completed"